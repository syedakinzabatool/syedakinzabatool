name: Cache Waka Images

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create assets dir
        run: mkdir -p assets

      - name: Download top-langs SVG
        run: |
          set -e
          TOP_URL="https://github-readme-stats.vercel.app/api/top-langs/?username=syedakinzabatool&layout=compact&theme=dark&hide_border=true&card_width=300"
          curl -sfL "$TOP_URL" -o assets/top-langs.svg || echo "fetch failed"

      - name: Download streak SVG
        run: |
          set -e
          STREAK_URL="https://streak-stats.demolab.com?user=syedakinzabatool&hide_border=true&background=00000000&ring=d4af37&fire=fbbf24&currStreakNum=ffffff&sideNums=e5e5e5&currStreakLabel=d4af37&sideLabels=cccccc&dates=facc15"
          curl -sfL "$STREAK_URL" -o assets/streak.svg || echo "fetch failed"

      - name: Commit and push cached images
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add assets/top-langs.svg assets/streak.svg || true
          git commit -m "chore: update cached Waka images" || echo "no changes to commit"
          git push || echo "push failed"
